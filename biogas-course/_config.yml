# Book settings
title: "Biogas Training Course"
author: CREATIVenergie
copyright: "2025 CREATIVenergie"

# Auto-exclude patterns
exclude_patterns:
  - _build
  - .venv
  - Thumbs.db
  - .DS_Store
  - "**.ipynb_checkpoints"
  - README.md

# Execution settings (no notebooks, so this is minimal)
execute:
  execute_notebooks: off

# HTML-specific settings
html:
  favicon: assets/favicon-flame.svg
  use_issues_button: false
  use_repository_button: true
  use_edit_page_button: false
  home_page_in_navbar: true
  extra_footer: |
    <p>
      Built with <a href="https://jupyterbook.org">Jupyter Book</a> &mdash;
      Content by <a href="https://creativenergie.co.uk">CREATIVenergie</a>.
    </p>
    <p style="font-size:0.85em; color:#888;">
      ⚠️ This course is for educational purposes. Always follow local safety
      regulations when building or operating a biogas system.
    </p>

repository:
  url: https://github.com/creativenergie/biogas-course
  branch: main

# Table of contents
# (driven by _toc.yml)

# Sphinx extensions
sphinx:
  extra_extensions:
    - sphinxext.opengraph
  config:
    html_show_sourcelink: false
    ogp_site_url: "https://learn.creativenergie.co.uk/"
    ogp_site_name: "Biogas Training Course — CREATIVenergie"
    ogp_description_length: 200
    ogp_image: "https://learn.creativenergie.co.uk/_images/image1.jpg"
    html_js_files:
      - progress.js
      - quiz.js
    html_css_files:
      - quiz.css
    html_theme_options:
      show_navbar_depth: 2
      navigation_depth: 4
