name: Deploy Jupyter Book to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Inject config secrets
        env:
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
          QUIZ_FORM_ID:    ${{ secrets.QUIZ_FORM_ID }}
          ENTRY_NAME:      ${{ secrets.ENTRY_NAME }}
          ENTRY_CODE:      ${{ secrets.ENTRY_CODE }}
          ENTRY_SESSION:   ${{ secrets.ENTRY_SESSION }}
          ENTRY_SCORE:     ${{ secrets.ENTRY_SCORE }}
          REG_FORM_ID:     ${{ secrets.REG_FORM_ID }}
          REG_ENTRY_NAME:  ${{ secrets.REG_ENTRY_NAME }}
          REG_ENTRY_EMAIL: ${{ secrets.REG_ENTRY_EMAIL }}
          REG_ENTRY_CTRY:  ${{ secrets.REG_ENTRY_CTRY }}
          REG_ENTRY_CODE:  ${{ secrets.REG_ENTRY_CODE }}
        run: python scripts/inject_config.py

      - name: Build Jupyter Book
        run: jupyter-book build .

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _build/html

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
